# PostgreSQL
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:digitaldetox}
spring.datasource.username=${POSTGRES_USER:detox_user}
spring.datasource.password=${POSTGRES_PASSWORD:detox_pass}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.security.secret-key=QAvIUJMhYX0NeW2BvjuzaiU23MXAOHX5OGNwLFiPmJo3m7qNz92kFjYBVQwDo0sk
app.security.jwt-expiration=10800000

allowed.origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173

file.upload.dir=uploads/

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
